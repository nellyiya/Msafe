services:
  - type: web
    name: mamasafe-api
    runtime: python
    runtimeVersion: "3.11"
    rootDirectory: backend/api
    buildCommand: pip install --upgrade pip && pip install --only-binary=all pandas==2.2.0 numpy==1.26.4 && pip install --only-binary=all -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_NO_CACHE_DIR
        value: "1"
      - key: PIP_DISABLE_PIP_VERSION_CHECK
        value: "1"
